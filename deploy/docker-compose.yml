# Local event-driven stack: Redpanda (Kafka-API compatible) + API + worker.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Redpanda speaks the Kafka protocol, so the same confluent-kafka client code
# runs unchanged against real Kafka in production.
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ../backend
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:19092
      ANALYSIS_TOPIC: analysis-requests
      JOB_STORE: redis
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: mock
    ports:
      - "8000:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ../backend
    command: ["python", "-m", "app.worker"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:19092
      ANALYSIS_TOPIC: analysis-requests
      JOB_STORE: redis
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: mock
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
