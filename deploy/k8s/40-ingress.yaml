apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resume-jd-matcher
  namespace: resume-jd-matcher
  labels:
    app.kubernetes.io/name: resume-jd-matcher
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: resume-jd-matcher.local
      http:
        paths:
          # API traffic is served by the FastAPI backend.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          # Everything else is the Next.js frontend.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
