apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: resume-jd-matcher
  labels:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resume-jd-matcher
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resume-jd-matcher
        app.kubernetes.io/component: frontend
      annotations:
        # Accepted residual finding: CKV_K8S_43 (digest pinning) is satisfied by
        # CI at publish time, not in source, since images are not yet published.
        autopilot.example.com/note: "image digest is pinned by the release pipeline"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: ghcr.io/damika-anupama/resume-jd-matcher-frontend:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: resume-jd-matcher
  labels:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
