apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: resume-jd-matcher
  labels:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resume-jd-matcher
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resume-jd-matcher
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: ghcr.io/damika-anupama/resume-jd-matcher-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: resume-jd-matcher
  labels:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: resume-jd-matcher
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
