name: CI

# Lint, test, and run the evaluation harness on every push / PR.
# All steps run with the deterministic mock path (no API key required), so CI is
# fully reproducible and needs no secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest + eval harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Unit tests (pytest, integration excluded)
        run: python -m pytest -q -m "not integration"

      - name: Evaluation harness (golden-set accuracy gate)
        run: python -m app.evaluate

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Skill dictionary is in sync with backend
        run: node ../scripts/sync-skills.mjs --check

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (next build)
        run: npm run build

  e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (builds standalone + serves via scripts/serve-e2e.mjs)
        run: npm run test:e2e

  deploy:
    name: IaC validation (terraform + kubeconform + checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install checkov + kubeconform
        run: |
          pipx install checkov
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          sudo tar -C /usr/local/bin -xzf /tmp/kubeconform.tar.gz kubeconform

      - name: Validate IaC (terraform fmt/validate + kubeconform + checkov)
        run: bash deploy/scripts/validate.sh
