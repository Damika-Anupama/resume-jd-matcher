name: CI

# Lint, test, and run the evaluation harness on every push / PR.
# All steps run with the deterministic mock path (no API key required), so CI is
# fully reproducible and needs no secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest + eval harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Unit tests (pytest, integration excluded)
        run: python -m pytest -q -m "not integration"

      - name: Evaluation harness (golden-set accuracy gate)
        run: python -m app.evaluate

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (next build)
        run: npm run build
